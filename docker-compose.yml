services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fraudguard
      POSTGRES_USER: fraudguard
      POSTGRES_PASSWORD: fraudguard_local
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fraudguard
      MINIO_ROOT_PASSWORD: fraudguard_local
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://fraudguard:fraudguard_local@postgres:5432/fraudguard
      REDIS_URL: redis://redis:6379/0
      STORAGE_TYPE: minio
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: fraudguard
      MINIO_SECRET_KEY: fraudguard_local
      MINIO_BUCKET: fraudguard-documents
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-local_dev_secret_change_in_prod}
      ENVIRONMENT: development
      ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery_worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://fraudguard:fraudguard_local@postgres:5432/fraudguard
      REDIS_URL: redis://redis:6379/0
      STORAGE_TYPE: minio
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: fraudguard
      MINIO_SECRET_KEY: fraudguard_local
      MINIO_BUCKET: fraudguard-documents
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-local_dev_secret_change_in_prod}
      ENVIRONMENT: development
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes: [./backend:/app]
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev

volumes:
  postgres_data:
  minio_data:
