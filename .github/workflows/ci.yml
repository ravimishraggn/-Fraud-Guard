name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tooling
        run: pip install ruff
      - name: Lint backend
        run: ruff check backend/app scripts
      - name: Compile check
        run: python -m compileall backend/app scripts

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Type check & build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"
      - name: Terraform fmt & validate
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate

  docker-images:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t fraudguard-backend ./backend
      - name: Build frontend image
        run: docker build -t fraudguard-frontend ./frontend
      # Push to ECR happens here once AWS credentials are configured:
      # - uses: aws-actions/configure-aws-credentials@v4
      # - uses: aws-actions/amazon-ecr-login@v2
